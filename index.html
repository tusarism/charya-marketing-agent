<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>চর্যা — Marketing Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink: #0f0e0a;
      --paper: #f5f0e8;
      --saffron: #c8861a;
      --ochre: #e8a825;
      --rust: #8b3a2a;
      --mist: #d4cfc4;
      --deep: #1a1712;
      --accent: #2d5a3d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--ink);
      color: var(--paper);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }
    header {
      border-bottom: 1px solid rgba(200,134,26,0.3);
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'Tiro Bangla', serif;
      font-size: 2.2rem;
      color: var(--ochre);
      letter-spacing: -0.02em;
    }
    .logo span {
      color: var(--mist);
      font-size: 0.85rem;
      display: block;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.15em;
      margin-top: 0.2rem;
      opacity: 0.6;
    }
    .tagline {
      font-family: 'Tiro Bangla', serif;
      color: var(--mist);
      font-size: 0.9rem;
      opacity: 0.5;
      letter-spacing: 0.1em;
    }
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }
    .section-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--saffron);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      opacity: 0.8;
    }
    .api-section {
      background: rgba(200,134,26,0.05);
      border: 1px solid rgba(200,134,26,0.2);
      border-radius: 4px;
      padding: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .api-section.unlocked {
      border-color: rgba(45,90,61,0.4);
      background: rgba(45,90,61,0.05);
    }
    .api-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .api-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(200,134,26,0.25);
      border-radius: 3px;
      padding: 0.65rem 1rem;
      color: var(--paper);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.2s;
    }
    .api-input:focus { border-color: var(--saffron); }
    .api-status {
      font-size: 0.72rem;
      margin-top: 0.5rem;
      font-family: 'DM Mono', monospace;
      opacity: 0.6;
    }
    .api-status.ok { color: #6bcf8e; }
    .api-status.err { color: #e07070; }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .control-group label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--saffron);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      opacity: 0.8;
    }
    textarea, select, input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(200,134,26,0.2);
      border-radius: 3px;
      padding: 0.85rem 1rem;
      color: var(--paper);
      font-family: 'Tiro Bangla', serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    textarea:focus, select:focus { border-color: var(--saffron); background: rgba(200,134,26,0.04); }
    textarea { min-height: 120px; }
    select option { background: var(--deep); color: var(--paper); }
    .platform-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .platform-pill {
      padding: 0.45rem 1rem;
      border: 1px solid rgba(200,134,26,0.25);
      border-radius: 2px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--mist);
      background: transparent;
      user-select: none;
    }
    .platform-pill:hover { border-color: var(--saffron); color: var(--ochre); }
    .platform-pill.active { background: var(--saffron); border-color: var(--saffron); color: var(--ink); font-weight: 500; }
    .generate-btn {
      width: 100%;
      padding: 1rem;
      background: var(--saffron);
      color: var(--ink);
      border: none;
      border-radius: 3px;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      margin-bottom: 2.5rem;
    }
    .generate-btn:hover { background: var(--ochre); transform: translateY(-1px); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .generate-btn .loading { display: none; }
    .generate-btn.loading-state .label { display: none; }
    .generate-btn.loading-state .loading { display: inline; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    .output-section { display: none; }
    .output-section.visible { display: block; }
    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(200,134,26,0.15);
    }
    .output-title { font-family: 'Tiro Bangla', serif; font-size: 1.4rem; color: var(--ochre); }
    .output-meta { font-size: 0.68rem; color: var(--mist); opacity: 0.5; font-family: 'DM Mono', monospace; }
    .content-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(200,134,26,0.15);
      border-radius: 4px;
      margin-bottom: 1.25rem;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: rgba(200,134,26,0.08);
      border-bottom: 1px solid rgba(200,134,26,0.12);
    }
    .card-platform {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: var(--saffron);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
    }
    .copy-btn {
      background: transparent;
      border: 1px solid rgba(200,134,26,0.3);
      border-radius: 2px;
      color: var(--mist);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .copy-btn:hover { border-color: var(--saffron); color: var(--ochre); }
    .copy-btn.copied { border-color: #6bcf8e; color: #6bcf8e; }
    .card-body {
      padding: 1.25rem;
      font-family: 'Tiro Bangla', serif;
      font-size: 1rem;
      line-height: 1.85;
      color: var(--paper);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .char-count {
      padding: 0.5rem 1.25rem;
      font-size: 0.65rem;
      color: var(--mist);
      opacity: 0.4;
      font-family: 'DM Mono', monospace;
      border-top: 1px solid rgba(200,134,26,0.08);
    }
    .history-section {
      margin-top: 3rem;
      border-top: 1px solid rgba(200,134,26,0.1);
      padding-top: 2rem;
    }
    .history-item {
      padding: 0.85rem 1rem;
      border: 1px solid rgba(200,134,26,0.1);
      border-radius: 3px;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.15s;
    }
    .history-item:hover { border-color: rgba(200,134,26,0.3); background: rgba(200,134,26,0.04); }
    .history-topic { font-family: 'Tiro Bangla', serif; font-size: 0.95rem; color: var(--paper); }
    .history-time { font-size: 0.65rem; color: var(--mist); opacity: 0.4; font-family: 'DM Mono', monospace; }
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(200,134,26,0.3), transparent);
      margin: 2rem 0;
    }
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--rust);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      z-index: 1000;
      display: none;
      max-width: 320px;
    }
    .toast.visible { display: block; }
    @media (max-width: 640px) {
      .controls { grid-template-columns: 1fr; }
      header { padding: 1.5rem; flex-direction: column; gap: 0.5rem; text-align: center; }
      .main { padding: 2rem 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    চর্যা
    <span>CONTENT MARKETING AGENT</span>
  </div>
  <div class="tagline">দেখো · ভাবো · জানো</div>
</header>

<div class="main">

  <div class="api-section" id="apiSection">
    <div class="section-title">Gemini API Key</div>
    <div class="api-row">
      <input type="password" class="api-input" id="apiKey" placeholder="AIzaSy... (তোমার নতুন key দাও)"/>
      <button class="copy-btn" onclick="saveKey()" style="padding:0.65rem 1.25rem; white-space:nowrap;">Save করো</button>
    </div>
    <div class="api-status" id="apiStatus">Key save হলে এখানে দেখাবে</div>
  </div>

  <div class="controls">
    <div class="control-group" style="grid-column: 1/-1;">
      <label>Content-এর বিষয় / Topic</label>
      <textarea id="topic" placeholder="যেমন: বাংলাদেশের ১৯৭১ সালের মুক্তিযুদ্ধে নারীদের ভূমিকা..."></textarea>
    </div>
    <div class="control-group">
      <label>ভাষা / Language</label>
      <select id="language">
        <option value="bengali">বাংলা</option>
        <option value="english">English</option>
        <option value="both">বাংলা + English (Bilingual)</option>
      </select>
    </div>
    <div class="control-group">
      <label>Tone / স্বর</label>
      <select id="tone">
        <option value="investigative">গভীর বিশ্লেষণমূলক (Investigative)</option>
        <option value="educational">শিক্ষামূলক (Educational)</option>
        <option value="storytelling">গল্পের ঢঙে (Storytelling)</option>
        <option value="satire">ব্যঙ্গাত্মক (Satire)</option>
        <option value="breaking">ব্রেকিং নিউজ স্টাইল</option>
      </select>
    </div>
  </div>

  <div class="section-title" style="margin-bottom:0.75rem;">Platform বেছে নাও</div>
  <div class="platform-grid" id="platformGrid">
    <div class="platform-pill active" data-platform="facebook">📘 Facebook Post</div>
    <div class="platform-pill active" data-platform="youtube">🎥 YouTube Description</div>
    <div class="platform-pill active" data-platform="instagram">📸 Instagram/Reels</div>
    <div class="platform-pill active" data-platform="newsletter">📧 Newsletter</div>
    <div class="platform-pill active" data-platform="article">📰 Website Article</div>
  </div>

  <div class="divider"></div>

  <button class="generate-btn" id="generateBtn" onclick="generateContent()">
    <span class="label">✦ Content তৈরি করো</span>
    <span class="loading"><span class="spinner"></span>তৈরি হচ্ছে...</span>
  </button>

  <div class="output-section" id="outputSection">
    <div class="output-header">
      <div class="output-title" id="outputTitle">Generated Content</div>
      <div class="output-meta" id="outputMeta"></div>
    </div>
    <div id="outputCards"></div>
  </div>

  <div class="history-section" id="historySection" style="display:none;">
    <div class="section-title">আগের Content</div>
    <div id="historyList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let history = JSON.parse(localStorage.getItem('charya_history') || '[]');

  function saveKey() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key.startsWith('AIza')) { showStatus('❌ Invalid key format', 'err'); return; }
    localStorage.setItem('charya_gemini_key', key);
    document.getElementById('apiKey').value = '●'.repeat(20);
    document.getElementById('apiSection').classList.add('unlocked');
    showStatus('✅ Key save হয়েছে', 'ok');
  }

  function showStatus(msg, type) {
    const el = document.getElementById('apiStatus');
    el.textContent = msg;
    el.className = 'api-status ' + type;
  }

  window.onload = () => {
    const saved = localStorage.getItem('charya_gemini_key');
    if (saved) {
      document.getElementById('apiKey').value = '●'.repeat(20);
      document.getElementById('apiSection').classList.add('unlocked');
      showStatus('✅ Key আগে থেকে save আছে', 'ok');
    }
    renderHistory();
  };

  document.querySelectorAll('.platform-pill').forEach(pill => {
    pill.addEventListener('click', () => pill.classList.toggle('active'));
  });

  function getSelectedPlatforms() {
    return [...document.querySelectorAll('.platform-pill.active')].map(p => p.dataset.platform);
  }

  const platformConfig = {
    facebook: { icon: '📘', label: 'FACEBOOK POST', instruction: 'একটি engaging Facebook post লেখো। ২০০-৩৫০ শব্দ। ইমোজি ব্যবহার করো। শেষে ৩-৫টি relevant hashtag দাও।' },
    youtube: { icon: '🎥', label: 'YOUTUBE', instruction: 'একটি YouTube video-র জন্য compelling title এবং description লেখো। Timestamps placeholder, keywords, subscribe CTA দাও।' },
    instagram: { icon: '📸', label: 'INSTAGRAM / REELS', instruction: 'একটি Instagram caption লেখো। ১৫০-২২০ শব্দ। শেষে ১৫-২০টি hashtag দাও। Reels hook line আলাদা করে দাও।' },
    newsletter: { icon: '📧', label: 'NEWSLETTER', instruction: 'Subject line, preview text, এবং body (৩০০-৫০০ শব্দ) আলাদা করে দাও। Personal tone রাখো।' },
    article: { icon: '📰', label: 'WEBSITE ARTICLE', instruction: '৬০০-৮০০ শব্দের article লেখো। Headline, subheadings, structured paragraphs রাখো।' }
  };

  async function generateContent() {
    const topic = document.getElementById('topic').value.trim();
    const apiKey = localStorage.getItem('charya_gemini_key');
    const platforms = getSelectedPlatforms();
    const language = document.getElementById('language').value;
    const tone = document.getElementById('tone').value;

    if (!topic) { showToast('বিষয় লিখতে ভুলে গেছো!'); return; }
    if (!apiKey) { showToast('আগে API key save করো!'); return; }
    if (platforms.length === 0) { showToast('অন্তত একটা platform বেছে নাও!'); return; }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.classList.add('loading-state');
    document.getElementById('outputSection').classList.remove('visible');
    document.getElementById('outputCards').innerHTML = '';

    const langMap = { bengali: 'বাংলায়', english: 'in English', both: 'বাংলায় এবং English-এ' };
    const toneMap = { investigative: 'গভীর investigative journalism ধরনে', educational: 'শিক্ষামূলক সহজ ভাষায়', storytelling: 'গল্প বলার ঢঙে', satire: 'তীক্ষ্ণ ব্যঙ্গাত্মক ভঙ্গিতে', breaking: 'breaking news ধরনে' };

    try {
      for (let i = 0; i < platforms.length; i++) {
        const platform = platforms[i];
        const config = platformConfig[platform];
        const prompt = `তুমি চর্যা মিডিয়ার content writer। চর্যা হলো বাংলাদেশি investigative journalism ও history/archive research platform। Tagline: "দেখো, ভাবো, জানো"।\n\nবিষয়: ${topic}\n\n${langMap[language]} এবং ${toneMap[tone]} নিচের কাজটি করো:\n\n${config.instruction}\n\nচর্যার editorial voice: bold, credible, authoritative। সরাসরি content দাও, কোনো preamble না।`;

        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { temperature: 0.85, maxOutputTokens: 1200 }
            })
          }
        );

        if (!response.ok) { const err = await response.json(); throw new Error(err.error?.message || 'API error'); }
        const data = await response.json();
        const content = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Content পাওয়া যায়নি।';
        renderCard(platform, config, content, i);
      }

      const now = new Date();
      document.getElementById('outputTitle').textContent = topic.substring(0, 50) + (topic.length > 50 ? '...' : '');
      document.getElementById('outputMeta').textContent = `${platforms.length} platform · ${now.toLocaleDateString('bn-BD')}`;
      document.getElementById('outputSection').classList.add('visible');
      saveToHistory(topic, platforms);

    } catch (err) {
      showToast('Error: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading-state');
    }
  }

  function renderCard(platform, config, content, index) {
    const card = document.createElement('div');
    card.className = 'content-card';
    card.style.animationDelay = (index * 0.1) + 's';
    card.innerHTML = `
      <div class="card-header">
        <div class="card-platform"><span>${config.icon}</span><span>${config.label}</span></div>
        <button class="copy-btn" onclick="copyContent(this, '${platform}')">Copy</button>
      </div>
      <div class="card-body" id="content-${platform}">${escapeHtml(content)}</div>
      <div class="char-count">${content.length} characters</div>
    `;
    document.getElementById('outputCards').appendChild(card);
  }

  function copyContent(btn, platform) {
    const text = document.getElementById('content-' + platform).textContent;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function escapeHtml(text) {
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function saveToHistory(topic, platforms) {
    history.unshift({ topic, platforms, time: new Date().toISOString() });
    if (history.length > 20) history = history.slice(0, 20);
    localStorage.setItem('charya_history', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) return;
    document.getElementById('historySection').style.display = 'block';
    document.getElementById('historyList').innerHTML = history.slice(0, 5).map(item => `
      <div class="history-item" onclick="document.getElementById('topic').value='${item.topic.replace(/'/g, "\\'")}'; window.scrollTo({top:0,behavior:'smooth'})">
        <div class="history-topic">${item.topic.substring(0, 60)}${item.topic.length > 60 ? '...' : ''}</div>
        <div class="history-time">${new Date(item.time).toLocaleDateString('bn-BD')}</div>
      </div>
    `).join('');
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 4000);
  }
</script>
</body>
</html>
